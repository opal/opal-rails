on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - ci-check
      - "*/ci-check"
      - master

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - ruby: '3.0'
            rails: 'rails_7_0'
            opal: 'opal_1_8'
          - ruby: '3.1'
            rails: 'rails_7_0'
            opal: 'opal_1_8'
          - ruby: '3.2'
            rails: 'rails_7_0'
            opal: 'opal_1_8'
          - ruby: '3.2'
            rails: 'rails_8_0'
            opal: 'opal_1_8'
          - ruby: '3.2'
            rails: 'rails_8_1'
            opal: 'opal_1_8'
    runs-on: ubuntu-latest

    steps:
    - name: Install libraries
      run: |
        sudo apt-get update
        sudo apt-get install -y sqlite3 libsqlite3-dev
        command -v google-chrome || command -v google-chrome-stable || command -v chromium-browser || command -v chromium || sudo apt-get install -y chromium-browser || sudo apt-get install -y chromium
    - uses: actions/checkout@v1
    - name: Set up Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: ${{ matrix.ruby }}
    - name: Install Dependencies
      run: |
        export BUNDLE_GEMFILE="gemfiles/${{ matrix.rails }}_${{ matrix.opal }}.gemfile"
        gem install bundler
        bundle install --jobs 4 --retry 3
    - name: Test with Rake
      run: |
        export BUNDLE_GEMFILE="gemfiles/${{ matrix.rails }}_${{ matrix.opal }}.gemfile"
        bundle exec rake
